<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos — Grupo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f0;--card:#ffffff;--border:#e0e0d8;
  --text:#1a1a1a;--muted:#999990;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
html{font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;padding:0 0 3rem;}

.hero{padding:2.5rem 1.5rem 1.5rem;text-align:center;}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:block;}
.hero h1{font-size:clamp(24px,7vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:.5rem;}
.hero h1 em{font-style:normal;color:var(--muted);}
.hero p{font-size:13px;color:var(--muted);font-family:var(--mono);line-height:1.7;max-width:300px;margin:0 auto;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 1.25rem;max-width:500px;margin:0 auto;}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:1.5rem 1.25rem 1.1rem;text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;min-height:150px;
  position:relative;overflow:hidden;
  transition:transform .18s,box-shadow .18s;
}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--c,#1a1a1a);border-radius:20px 20px 0 0;}
.card:active{transform:scale(.97);}
@media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:#ccc;}}

.card-tiko      {--c:#1a3a2a;}
.card-koya      {--c:#1a1a2e;}
.card-yug       {--c:#CC2020;}
.card-bagaceira {--c:#3a0e4e;}
.card-krozta    {--c:#0e2040;}

.card-name{
  font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1;
  flex:1;display:flex;align-items:center;
  color:var(--c,#1a1a1a);
}
.card-bottom{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:auto;padding-top:.75rem;}
.card-badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.card-arrow{font-size:18px;font-weight:700;color:var(--c,#1a1a1a);}

.card-wide{grid-column:1/-1;min-height:100px;flex-direction:row;align-items:center;padding:1.1rem 1.25rem;gap:1rem;}
.card-wide .card-name{font-size:28px;flex:1;}
.card-wide .card-bottom{flex:0;flex-direction:column;align-items:flex-end;gap:4px;padding:0;}

footer{text-align:center;margin-top:2rem;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.05em;}
</style>
</head>
<body>

<section class="hero">
  <span class="eyebrow">Sistema de pedidos</span>
  <h1>Selecione o<br/><em>restaurante</em></h1>
  <p>Controle de estoque e pedidos via WhatsApp para cada operação.</p>
</section>

<div class="grid">

  <a href="tiko.html" class="card card-tiko">
    <div class="card-name">Tikô</div>
    <div class="card-bottom">
      <span class="card-badge">TKO · SP</span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a href="koya.html" class="card card-koya">
    <div class="card-name">Koya88</div>
    <div class="card-bottom">
      <span class="card-badge">KY88 · SP</span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a href="yug.html" class="card card-yug">
    <div class="card-name">Yug</div>
    <div class="card-bottom">
      <span class="card-badge">YUG · SP</span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a href="bagaceira.html" class="card card-bagaceira">
    <div class="card-name">Bagaceira</div>
    <div class="card-bottom">
      <span class="card-badge">BGC · SP</span>
      <span class="card-arrow">→</span>
    </div>
  </a>

  <a href="krozta.html" class="card card-krozta card-wide">
    <div class="card-name">Krozta</div>
    <div class="card-bottom">
      <span class="card-badge">KRZ · SP</span>
      <span class="card-arrow">→</span>
    </div>
  </a>

</div>

<footer>Grupo · Sistema interno de pedidos</footer>
</body>
</html>
